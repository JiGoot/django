{% extends "auth/base.html" %}
{% load crispy_forms_tags static %}

{% block content %}
<link href="https://bootswatch.com/5/flatly/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card-body text-center">
        <img src="{% static 'images/logo.png' %}" alt="JiGoot Logo" class="img-fluid mb-3" style="max-height: 80px;">

        <h3 class="card-title mb-3">
          <i class="bi bi-box-arrow-in-right me-2"></i>
          Connexion
        </h3>

        <form method="post" novalidate>
          {% csrf_token %}
          {{ form|crispy }}
          <div class="d-grid gap-2 mt-3">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-box-arrow-in-right me-1"></i>
              Se connecter
            </button>
          </div>
        </form>

        <div class="text-center mt-3">
          <a href="{% url 'password_reset' %}" class="text-decoration-none">
            <i class="bi bi-shield-lock me-1"></i>
            Mot de passe oublié ?
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
