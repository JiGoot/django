<!-- templates/registration/password_reset_token_invalid.html -->
{% extends "auth/base.html" %}

{% block title %}Lien invalide{% endblock %}

{% block content %}
    <div class="alert alert-danger" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-1"></i>
        Le lien de réinitialisation de mot de passe est invalide, peut-être parce qu’il a déjà été utilisé. Veuillez demander un nouveau lien.
    </div>
    <a href="{% url 'password_reset' %}" class="btn btn-primary">
        <i class="bi bi-arrow-repeat me-1"></i> Réinitialiser le mot de passe
    </a>
{% endblock %}
