{% extends "auth/base.html" %}
{% load crispy_forms_tags static %}

{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <!-- <div class="card shadow border-0"> -->
        <div class="card-body text-center">
          <img src="{% static 'images/logo.png' %}" alt="JiGoot Logo" class="img-fluid mb-3" style="max-height: 80px;">

          <h3 class="card-title mb-3">
            <i class="bi bi-shield-lock-fill me-2"></i>
            Réinitialiser le mot de passe
          </h3>

          <p class="text-muted">
            Entrez votre adresse e-mail. Nous vous enverrons un lien sécurisé pour réinitialiser votre mot de passe.
          </p>

          <form method="post" novalidate>
            {% csrf_token %}
            {{ form|crispy }}
            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary">
                <i class="bi bi-envelope-paper-fill me-1"></i>
                Envoyer le lien
              </button>
            </div>
          </form>

          <div class="text-center mt-3">
            <a href="" class="text-decoration-none">
              <i class="bi bi-arrow-left-circle me-1"></i>
              Retour à la connexion
            </a>
          </div>
        </div>
      <!-- </div> -->
    </div>
  </div>
</div>
{% endblock %}
