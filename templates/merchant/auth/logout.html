{% extends "merchant/auth/base.html" %}
{% load hosts crispy_forms_tags static %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card-body text-center">
                    <div class="mb-3">
                        <i class="bi bi-box-arrow-right text-primary" style="font-size: 3rem;"></i>
                    </div>
                    <h4 class="mb-2">You’ve been logged out</h4>
                    <p class="text-muted mb-4">Thank you for using Jigoot services.</p>
                    <a href="{% host_url 'login' host 'merchant'%}" class="btn btn-primary">
                        <i class="bi bi-box-arrow-in-right me-1"></i> Log back in
                    </a>
                </div>   

        </div>
    </div>
</div>
{% endblock %}
